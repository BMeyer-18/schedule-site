<!DOCTYPE html>
<html lang="en-US">
    <head>
        <meta charset="utf-8">
        <title>Scheduler</title>
        <link rel="stylesheet" href="./viewer_style.css">
        <link rel="stylesheet" href="./style.css">
    </head>
    <body>
        <header>
            <h1>Scheduler</h1>
            <a href="./index.html"><h2>Send Your Schedule</h2></a>
        </header>

        <h1 align="center">View Responses</h1>

        <main>
            <div class="question">
                <form>
                    <div class="question">
                        <label for="event">Event:</label>
                        <input type="text" id="event" name="event">
                    </div>
                    <div class="question">
                        <label for="password">Password:</label>
                        <input placeholder="NOT YET IMPLEMENTED" type="text" id="password" name="password">
                    </div>
                </form>
                <button onclick="loadResponses()" style="margin: 10px 0 0 0;">load responses</button>
                <p align="center" id="message"></p>
                <h3 id="instructions" align="center" style="display: none;">Toggle each of the buttons below to look at each person's availability.<br>Selecting multiple will show the average of the selected group at each time slot.</h3>
                <div id="response-buttons"></div>
            </div>
            <section id="full-grid">
                <div id="time-labels"></div>
                <div id="grid">
                    <div class="label">Sunday</div>
                    <div class="label">Monday</div>
                    <div class="label">Tuesday</div>
                    <div class="label">Wednesday</div>
                    <div class="label">Thursday</div>
                    <div class="label">Friday</div>
                    <div class="label">Saturday</div>
                </div>
            </section>
        </main>

        <script src="./viewer_script.js"></script>
    </body>
</html>
