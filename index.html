<!DOCTYPE html>
<html lang="en-US">
    <head>
        <meta charset="utf-8">
        <title>Scheduler</title>
        <link rel="stylesheet" href="./index_style.css">
        <link rel="stylesheet" href="./style.css">
    </head>
    <body>
        <header>
            <h1>Scheduler</h1>
            <div align="right">
                <a href="./viewer.html"><h2>View Responses</h2></a>
                <a href="./registration.html"><h3>Create New Event</h3></a>
            </div>
        </header>

        <h1 align="center">Send Your Schedule</h1>

        <main>
            <form>
                <div class="question">
                    <label for="name">Name:</label>
                    <input type="text" id="name" name="name">
                </div>
                <div class="question">
                    <label for="event">Event:</label>
                    <input type="text" id="event" name="event">
                </div>
            </form>
            <section>
                <h3 align="center">Select your availabilty<br>for each time slot</h3>
                <button class="level-1 selector">1</button>
                <button class="level-2 selector">2</button>
                <button class="level-3 selector">3</button>
                <button class="level-4 selector">4</button>
                <button class="level-5 selector selected">5</button>
            </section>
            <h3>and fill out the grid below</h3>
            <section id="full-grid">
                <div id="time-labels"></div>
                <div id="grid">
                    <div class="label">Sunday</div>
                    <div class="label">Monday</div>
                    <div class="label">Tuesday</div>
                    <div class="label">Wednesday</div>
                    <div class="label">Thursday</div>
                    <div class="label">Friday</div>
                    <div class="label">Saturday</div>
                </div>
            </section>
            <div>
                <button onclick="submit()" style="background-color: lightgreen">submit</button>
                <button onclick="remove()" style="background-color: lightcoral">delete</button>
            </div>
            <p align="center" id="message"></p>
        </main>

        <script src="./index_script.js"></script>
    </body>
</html>
